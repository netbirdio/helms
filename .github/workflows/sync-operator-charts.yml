name: Sync Operator Charts

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync-kubernetes-operator:
    uses: ./.github/workflows/sync-chart-template.yml
    with:
      upstream_repo: netbirdio/kubernetes-operator
      upstream_branch: main
      upstream_path: helm/kubernetes-operator
      local_path: charts/kubernetes-operator
      chart_name: kubernetes-operator
      pr_branch_prefix: sync/kubernetes-operator
    secrets: inherit

  sync-netbird-operator-config:
    uses: ./.github/workflows/sync-chart-template.yml
    with:
      upstream_repo: netbirdio/kubernetes-operator
      upstream_branch: main
      upstream_path: helm/netbird-operator-config
      local_path: charts/netbird-operator-config
      chart_name: netbird-operator-config
      pr_branch_prefix: sync/netbird-operator-config
    secrets: inherit
