{{- if and .Values.management.enabled .Values.management.useEmbeddedStunService -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "netbird.fullname" . }}-server-stun
  namespace: {{ include "netbird.namespace" . }}
  labels:
    {{- include "netbird.management.labels" . | nindent 4 }}
  {{- with .Values.management.serviceStun.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.management.serviceStun.type }}
  ports:
    - port: {{ .Values.management.serviceStun.port }}
      targetPort: {{ .Values.management.serviceStun.name }}
      protocol: UDP
      name: {{ .Values.management.serviceStun.name }}
  selector:
    {{- include "netbird.management.selectorLabels" . | nindent 4 }}
  {{- with .Values.management.serviceStun.externalIPs }}
  externalIPs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
